<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>click on it</title>

<style>
  body {
    background: #000;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  #ui {
    position: relative;
    width: 700px;
    height: 700px;
    transform: rotate(-90deg);
  }

  .love_word {
    position: absolute;
    color: #e80b0b;
    font-size: 1.4rem;
    text-shadow: 0 0 10px #fff;
    letter-spacing: 2px;
    white-space: nowrap;
    transform: translateY(-100%) rotateZ(-30deg);
    animation: moveAlong 2.2s infinite linear;
  }

  @keyframes moveAlong {
    0% {
      transform: translateY(-100%) rotateZ(-30deg) translateX(-30px);
      opacity: 0.7;
    }
    100% {
      transform: translateY(-100%) rotateZ(-30deg) translateX(30px);
      opacity: 1;
    }
  }
</style>
</head>

<body>
<div id="ui"></div>

<!-- 外部JSを読み込む -->
<script src="love.js"></script>

</body>
</html>
